  <text x="36" y="44" font-family="monospace" font-size="24" fill="#111111">classic diamond</text>
  <text x="36" y="78" font-family="monospace" font-size="18" fill="#111111">the action axis is at 45 degrees</text>
  <text x="36" y="106" font-family="monospace" font-size="18" fill="#111111">the diagonal pair on that axis pinches inward</text>
