include_moon: true
craft:
  type: barbell
  mass: 1000.0
controller:
  type: bang_bang
  initial:
    altitude_m: 200000.0
    length0: 100000.0
    omega0: fast_prograde  # tidally_locked, no_rotation, prograde, retrograde, fast_prograde
    theta0: 0.0            # radians
  extend_accel: 0.01      # m/s^2
  retract_accel: 0.01     # m/s^2
integrator:
  t_final: 2592000.0  # 1 month
  dt_output: 5.0

