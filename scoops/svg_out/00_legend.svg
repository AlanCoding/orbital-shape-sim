<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Legend">
  <defs>
    <radialGradient id="atmoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ec9ff" stop-opacity="0"/>
      <stop offset="62%" stop-color="#8ec9ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8ec9ff" stop-opacity="0.26"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#aab7c4"/>
    </marker>
    <marker id="arrowheadWarm" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#ff8e42"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#a8d85f"/>
    </marker>
    <style>
      .bg { fill: #11161c; }
      .title { fill: #e9eef3; font: 600 26px Arial, Helvetica, sans-serif; letter-spacing: 0.2px; }
      .label { fill: #e9eef3; font: 20px Arial, Helvetica, sans-serif; }
      .soft { fill: #aab7c4; font: 18px Arial, Helvetica, sans-serif; }
      .orbit { fill: none; stroke: #bcc5cf; stroke-width: 2.5; opacity: 0.95; }
      .orbit-dashed { fill: none; stroke: #a8d85f; stroke-width: 2.5; stroke-dasharray: 9 8; opacity: 0.95; }
      .beam { fill: none; stroke: #7fdcff; stroke-width: 2.6; stroke-dasharray: 2 8; opacity: 0.95; }
      .collect-arc { fill: none; stroke: #ff8e42; stroke-width: 8; stroke-linecap: round; }
      .collect-hot { fill: none; stroke: #ff5d4d; stroke-width: 10; stroke-linecap: round; }
      .recovery-arc { fill: none; stroke: #6fd0c8; stroke-width: 6; stroke-linecap: round; opacity: 0.9; }
      .tether { fill: none; stroke: #d8e4ef; stroke-width: 4; }
      .vehicle { fill: #e9eef3; stroke: #11161c; stroke-width: 2; }
      .station { fill: #e9eef3; stroke: #11161c; stroke-width: 2; }
      .ring { fill: none; stroke: #e9eef3; stroke-width: 3; opacity: 0.9; }
      .leader { fill: none; stroke: #aab7c4; stroke-width: 1.8; }
      .arrow { fill: none; stroke: #aab7c4; stroke-width: 2.4; }
      .arrow-warm { fill: none; stroke: #ff8e42; stroke-width: 2.4; marker-end: url(#arrowheadWarm); }
      .arrow-green { fill: none; stroke: #a8d85f; stroke-width: 2.6; marker-end: url(#arrowheadGreen); }
      .field { fill: none; stroke: #7fdcff; stroke-width: 2.2; opacity: 0.5; }
      .ionosphere { fill: none; stroke: #6f89d0; stroke-width: 18; opacity: 0.16; }
      .magnetic { fill: none; stroke: #7fdcff; stroke-width: 1.8; opacity: 0.35; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="900"/>
  <text x="48" y="54" class="title">Legend</text>
  <circle cx="220" cy="180" r="50" fill="#4d7ea8"/><text x="320" y="187" class="label">blue circle = Earth</text><circle cx="220" cy="355" r="82" fill="none" stroke="#8ec9ff" stroke-opacity="0.25" stroke-width="18"/><circle cx="220" cy="355" r="68" fill="none" stroke="#a9dcff" stroke-opacity="0.22" stroke-width="10"/><text x="320" y="362" class="label">pale rings = atmosphere density falloff</text><line x1="120" y1="500" x2="310" y2="500" class="orbit"/><text x="320" y="507" class="label">gray line = orbit</text><path d="M 120 620 A 110 110 0 0 1 294 620" class="collect-arc"/><text x="320" y="627" class="label">orange / red arc = collection / heating / drag</text><line x1="120" y1="740" x2="310" y2="740" class="orbit-dashed"/><text x="320" y="747" class="label">dashed line = transfer path</text><line x1="780" y1="210" x2="780" y2="370" class="tether"/><text x="840" y="297" class="label">solid line = tether / pipe</text><circle cx="760" cy="560" r="7" class="vehicle"/><circle cx="860" cy="560" r="11" class="station"/><text x="900" y="552" class="label">dot = spacecraft / station</text><text x="900" y="578" class="label">not to scale</text>
</svg>
