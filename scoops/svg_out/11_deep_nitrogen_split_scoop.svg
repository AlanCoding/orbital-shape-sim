    <path d="M 460.19 555.34 A 237.85 260 0 0 1 382.71 450.75" class="collect-arc"/>
    <path d="M 817.29 450.75 A 237.85 260 0 0 1 739.81 555.34" class="collect-arc"/>
    <circle cx="600" cy="605" r="7" class="vehicle"/>
    <circle cx="951.94" cy="230.08" r="11" class="station"/>
    <path d="M 600 605 L 622 553" class="leader"/><text x="570" y="549" class="label">deep collector</text>
    <path d="M 951.94 230.08 L 985.94 194.08" class="leader"/><text x="993.94" y="190.08" class="label">courier craft</text>
    <text x="446" y="626" class="label">nitrogen-rich / severe heating</text>
    <text x="500" y="45" class="label" fill="#6fd0c8">gas liquefaction</text>
    <path d="M 640 470 L 460 507.5" class="leader"/>
    <path d="M 646 472 L 748 541" class="leader"/>
    <text x="650" y="468" class="soft">ion thrusters fire close to perigee</text>
    <text x="698" y="490" class="soft">when outside deep atmosphere</text>
    <text x="989.94" y="214.08" class="soft">own thrusters</text>
    
</svg>
